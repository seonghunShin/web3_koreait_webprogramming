<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>웹 사이트 제작중2</title>
        <link rel="stylesheet" href="css/style2.css">
    </head>

    <body>
        <header class="header-main">
            <div class="header-buttons">
                <button type="button" class="hamburger">
                <span class="button-text"></span>
                <img src="free-icon-menu-8771127.png" alt="" class="menu-icon">
                </button>
                <button type="button" class="darkmode">
                <span class="dark-text"></span>
                <img src="free-icon-sun-and-moon-18909062.png" alt="" class="dark-icon">
                </button>
            </div>
            <h1 id="main-title">웹사이트 이름</h1>
            <div class="tresh-space">
                <p></p>
            </div>
        </header>

        <main>
            <div class="main-image-box">
                <section class="main-image-flex1">
                    <div class="main-image">
                        <p>상품 입고중...</p>
                    </div>
                </section>
            </div>

            <div class="setting-all">
                <div class="setting-panel">
                    <p>참여중인 상품</p>
                </div>
                <div class="setting-panel2">
                    <p>인기 상품</p>
                </div>
            </div>
        </main>
    </body>
</html>
