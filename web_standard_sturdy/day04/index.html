<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 사이트 제작중</title>
    <link rel="stylesheet" href="css/style.css">
  </head>

  <body>
    <header class="header-main">
      <div class="header-buttons">
        <button type="button" class="hamburger">
          <span class="button-text"></span>
          <img src="free-icon-menu-8771127.png" alt="" class="menu-icon">
        </button>
        <button type="button" class="darkmode">
          <span class="dark-text"></span>
          <img src="free-icon-sun-and-moon-18909062.png" alt="" class="dark-icon">
        </button>
      </div>
      <h1 id="main-title">웹사이트 이름</h1>
      <div class="sign">
        <button type="button" class="sign-in">
          <span class="button-text">로그인</span>
          <p class="header-sign-text">로그인</p>
        </button>
        <button type="button" class="sign-up">
          <span class="button-text">회원가입</span>
          <p class="header-sign-text">회원가입</p>
        </button>
      </div>
    </header>

    <main>

      <div class="search">
        <div class="search-container">
          <form action="search" method="GET" target="_blank">
            <div class="search-box">
              <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"></path></svg>
              <input type="text" name="q" class="search-input" placeholder="글자를 입력해주세요." autocomplete="off">
            </div>
          </form>
        </div>
      </div>

      <div class="main-main">
        <section class="main-flex1">
          <div class="main-box">
            <p>상품 입고중...</p>
          </div>
        </section>
        <section class="main-flex2">
          <div class="semi-boxs">
            <div class="semi-box1">
              <p>박스1</p>
            </div>
            <div class="semi-box1">
              <p>박스2</p>
            </div>
            <div class="semi-box1">
              <p>박스3</p>
            </div>
          </div>
        </section>
      </div>

      <div class="setting-panel">
        <h3>⚙️ 설정창</h3>
      </div>

    </main>
  </body>
</html>
